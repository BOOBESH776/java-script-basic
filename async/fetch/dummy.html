<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img {
            width: 250px;
            height: 250px;
        }
    </style>
</head>

<body>

    <input type="text" id="user">

    <button onclick="api()">Submit</button>

    <h3>Details</h3>
    <div id="bio"></div>
    <!-- <p id="data"></p> -->
    <script lang="javascript">
        function api() {
            data = document.getElementById("user").value;
            let bio = document.getElementById("bio");
            let api = fetch('https://dummyjson.com/products')
                .then(api => api.json())
                .then(jk => {
                    if (!jk.products[data]) {
                        bio.innerHTML = `<h3>We Don't Have a Product</h3>`;
                    }
                    else {
                        bio.innerHTML =
                            `<p>Name : ${jk.products[data].title}</p>
                        <p>description : ${jk.products[data].description}</p>
                        <p>category : ${jk.products[data].category}</p>
                        <p>price : ${jk.products[data].price}</p>
                        <p>discountPercentage : ${jk.products[data].discountPercentage}</p>
                        <p>rating : ${jk.products[data].rating}</p>
                        <p>stock : ${jk.products[data].stock}</p>
                        <p>tags : ${jk.products[data].tags}</p>
                        <p>brand : ${jk.products[data].brand}</p> 
                        <p>sku : ${jk.products[data].sku}</p> 
                        <p>weight : ${jk.products[data].weight}</p> 
                        <div>
                            <h3>dimensions :</h3> 
                            <p>height : ${jk.products[data].dimensions.height}</p>
                            <p>width : ${jk.products[data].dimensions.width}</p>
                            <p>depth : ${jk.products[data].dimensions.depth}</p>
                        </div>
                        <div> 
                            ${jk.products[data].reviews.map(review =>
                                `<h3>review</h3>
                                <p>rating : ${review.rating}</p>
                                <p>comment : ${review.comment}</p>
                                <p>reviewerName : ${review.reviewerName}</p>
                                <p>reviewerEmail : ${review.reviewerEmail}</p>`
                            )}
                        </div>
                        <div>
                            <h3>meta :</h3> 
                            <p>createdAt : ${jk.products[data].meta.createdAt}</p>
                            <p>updatedAt : ${jk.products[data].meta.updatedAt}</p>
                            <p>barcode : ${jk.products[data].meta.barcode}</p>
                            <img src = "${jk.products[data].meta.qrCode}">
                        </div>
                        <p>warrantyInformation : ${jk.products[data].warrantyInformation}</p> 
                        <p>shippingInformation : ${jk.products[data].shippingInformation}</p>  
                        <p>availabilityStatus : ${jk.products[data].availabilityStatus}</p>    
                        <img class="img" src = "${jk.products[data].images}">
                        <p>thumbnail : ${jk.products[data].thumbnail}</p> 
                        
                        
                        `;
                    }
                })
                .catch(error => console.log(error))
        }
    </script>
</body>

</html>
