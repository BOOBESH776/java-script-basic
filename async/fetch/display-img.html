<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        #card {
            width: 300px;
            height: max-content;
            border: 2px solid #000;
        }

        .card-img {
            width: 300px;
            height: 200px;
        }

        .card-img img {
            width: 200px;
            height: 200px;
        }

        .title {
            margin-left: 10px;
        }

        .price {
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }

        .dis-price {
            text-decoration: line-through;
        }
    </style>
</head>

<body>
    <h1>Cards</h1>

    <input type="text" id="data">
    <button onclick="displayimg()">show card</button><br><br>
    <div id="card"></div>
    <script>
        function displayimg() {
            let data = document.getElementById('data').value;
            let card = document.getElementById("card");
            let api = fetch('https://dummyjson.com/products')
                .then(res => res.json())
                .then(product => {
                    card.innerHTML = `
                        <div class="card-img">
                            <img src = "${product.products[data].images}">
                        </div>
                        <div class = "product-detail">
                            <p class ="title">Name : ${product.products[data].title}</p>
                            <span class="price">
                                <p class="dis-price"> ₹ ${product.products[data].price}</p>
                                <p class=""> ₹ ${product.products[data].discountPercentage}</p>
                            </span>

                        </div>
                    `
                })
        }
    </script>
</body>

</html>
