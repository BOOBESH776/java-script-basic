<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="text">
    <button onclick="rest()">Submit</button>

    <script lang="javascript">
        function rest(){
            var data = document.getElementById("text").value;
            fetch('https://dummyjson.com/products')
                .then(res => res.json())
                .then(jk => console.log(jk.products[data].title))
                .catch(error => console.log("error in product"))
        }
    </script>
</body>

</html>
